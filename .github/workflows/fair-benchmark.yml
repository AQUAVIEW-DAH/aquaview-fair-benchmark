name: FAIR Benchmark

on:
  schedule:
    # Run weekly on Monday at 8am UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      stac_url:
        description: "STAC API URL (leave empty for production)"
        required: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Run FAIR benchmark
        env:
          AQUAVIEW_STAC_URL: ${{ inputs.stac_url || '' }}
        run: python -m fair_benchmark -o reports/

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "FAIR benchmark $(date +%Y-%m-%d)"
          git push
